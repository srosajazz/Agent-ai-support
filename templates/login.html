<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — CoolBreeze AC</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f0f4f8;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .login-card {
        background: #fff;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      .brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .brand h4 {
        font-weight: 700;
        color: #1a1a2e;
        margin: 0;
      }

      .brand p {
        color: #6c757d;
        font-size: 13px;
        margin: 4px 0 0;
      }

      .form-label {
        font-size: 13px;
        color: #495057;
        font-weight: 500;
      }

      .form-control {
        border-radius: 8px;
        border: 1px solid #dee2e6;
        padding: 10px 14px;
        font-size: 14px;
      }

      .form-control:focus {
        border-color: #6c5ce7;
        box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
      }

      .btn-login {
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        font-weight: 500;
        width: 100%;
        margin-top: 8px;
      }

      .btn-login:hover {
        background: #2d2d4e;
        color: #fff;
      }

      .demo-hint {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 12px;
        color: #6c757d;
        margin-top: 20px;
        text-align: center;
      }

      .demo-hint strong {
        color: #495057;
      }

      .error-msg {
        background: #fff5f5;
        border: 1px solid #f8d7da;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        color: #842029;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="brand">
        <h4>❄️ CoolBreeze AC</h4>
        <p>Customer Portal</p>
      </div>

      {% if form.errors %}
      <div class="error-msg">
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter your username"
            autofocus
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter your password"
          />
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <div class="demo-hint">
        Demo credentials &nbsp;·&nbsp; username:
        <strong>sergio</strong> &nbsp;·&nbsp; password:
        <strong>demo1234</strong>
      </div>
    </div>
  </body>
</html>
